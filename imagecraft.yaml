name: oniecraft
base: bare
build-base: ubuntu@22.04
version: '1.0.0'
summary: ONIECraft NOS image
description: |
  ONIECraft Network Operating System image for ONIE-compatible switches.
  NOTE: Use 'make image' for the primary build pipeline (debootstrap).
  The imagecraft pipeline requires imagecraft >= 0.2.0 with working
  overlay support for base:bare. See build-with-imagecraft.sh.

platforms:
  amd64:

volumes:
  pc:
    schema: gpt
    structure:
      - name: rootfs
        type: 0FC63DAF-8483-4772-8E79-3D69D8477DE4
        filesystem: ext4
        filesystem-label: writable
        role: system-data
        size: 4G

filesystems:
  default:
    - mount: /
      device: (volume/pc/rootfs)

parts:
  rootfs:
    plugin: mmdebstrap
    mmdebstrap-suite: resolute
    mmdebstrap-variant: minbase
    build-packages:
      - mmdebstrap
    stage-packages:
      - systemd
      - systemd-sysv
      - systemd-resolved
      - dbus
      - iproute2
      - iputils-ping
      - openssh-server
      - sudo
      - less
      - kmod
      - initramfs-tools
      - ca-certificates
      - curl
      - gpg
      - locales
      - logrotate
      - zstd
      - net-tools
      - netplan.io
      - fancontrol
      - linux-image-generic
