name: oniecraft
base: ubuntu@26.04
sdks:
  - name: project-build-tools
actions:
  build: make image
  test: |
    make image
    ls -lh build/Ubuntu-*-x86_64-installer.bin
    cat build/kernel/.kernel_version
    test -f build/Ubuntu-*-x86_64-installer.bin && echo "Build verification PASSED"
  clean: make clean
  shell: bash
