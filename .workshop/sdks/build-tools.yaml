name: build-tools
hooks:
  setup-base: |
    apt-get update
    DEBIAN_FRONTEND=noninteractive apt-get install -y \
      make squashfs-tools debootstrap mmdebstrap \
      qemu-system-x86_64 qemu-img expect sshpass mtools zstd \
      initramfs-tools sudo kmod iproute2 iputils-ping \
      openssh-server ca-certificates curl gpg locales logrotate \
      systemd-resolved dbus
    systemctl enable ssh systemd-resolved systemd-networkd
    echo "root:root" | chpasswd
  setup-project: |
    echo "Build tools installed"
